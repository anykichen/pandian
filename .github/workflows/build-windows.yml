name: Build Windows EXE

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install PySide6 pyinstaller

      - name: Build with PyInstaller (dir build)
        run: |
          pyinstaller --noconfirm --windowed --name Pandian --add-data "pandian.py;." --add-data "icon.ico;." --icon "icon.ico" gui_qt.py

      - name: Zip dist directory
        run: pwsh -Command "Compress-Archive -Path 'dist/Pandian\\*' -DestinationPath 'dist/Pandian.zip' -Force"

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: pandian-windows-dist-zip
          path: dist/Pandian.zip
